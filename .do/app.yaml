name: cad-gurukul
region: blr

ingress:
  rules:
  - component:
      name: api
      preserve_path_prefix: true
    match:
      path:
        prefix: /api
  - component:
      name: frontend
    match:
      path:
        prefix: /

services:
- name: api
  github:
    repo: adishakash/cad-gurukul
    branch: main
    deploy_on_push: true
  source_dir: backend
  dockerfile_path: Dockerfile
  http_port: 5000
  # basic-s (1 GB RAM) is the minimum for Puppeteer/Chromium PDF generation.
  # basic-xs (512 MB) causes OOM crashes during report generation.
  instance_size_slug: basic-s
  instance_count: 1
  health_check:
    http_path: /api/v1/health
    # Allow extra time for `prisma migrate deploy` on cold starts.
    initial_delay_seconds: 150
    period_seconds: 30
    timeout_seconds: 10
    failure_threshold: 3
  envs:
  - key: NODE_ENV
    scope: RUN_TIME
    value: production
  - key: PORT
    scope: RUN_TIME
    value: "5000"
  - key: DATABASE_URL
    scope: RUN_TIME
    value: "${db.DATABASE_URL}"
  - key: DATABASE_DIRECT_URL
    scope: RUN_TIME
    value: "${db.DATABASE_URL}"
  - key: FRONTEND_URL
    scope: RUN_TIME
    value: "https://www.cadgurukul.com"
  - key: FRONTEND_URLS
    scope: RUN_TIME
    value: "https://cadgurukul.com,https://www.cadgurukul.com,${frontend.PUBLIC_URL}"
  - key: ALLOW_DO_PREVIEW_ORIGINS
    scope: RUN_TIME
    value: "true"
  - key: JWT_SECRET
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_min64chars_random_hex_string_replace_before_deploy
  - key: JWT_ACCESS_EXPIRES_IN
    scope: RUN_TIME
    value: 15m
  - key: JWT_REFRESH_EXPIRES_IN
    scope: RUN_TIME
    value: 7d
  - key: OPENAI_API_KEY
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_sk-your-openai-api-key
  - key: OPENAI_MODEL
    scope: RUN_TIME
    value: gpt-4o
  - key: OPENAI_MAX_TOKENS
    scope: RUN_TIME
    value: "4096"
  - key: GEMINI_API_KEY
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your-gemini-api-key
  - key: GEMINI_MODEL
    scope: RUN_TIME
    value: gemini-1.5-pro
  - key: AI_DEFAULT_PROVIDER
    scope: RUN_TIME
    value: auto
  - key: RAZORPAY_KEY_ID
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_rzp_live_xxxxxxxxxxxx
  - key: RAZORPAY_KEY_SECRET
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your_razorpay_secret
  - key: RAZORPAY_WEBHOOK_SECRET
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your_webhook_secret
  - key: SMTP_HOST
    scope: RUN_TIME
    value: smtpout.secureserver.net
  - key: SMTP_PORT
    scope: RUN_TIME
    value: "465"
  - key: SMTP_SECURE
    scope: RUN_TIME
    value: "true"
  - key: SMTP_USER
    scope: RUN_TIME
    type: SECRET
    value: contact@cadgurukul.com
  - key: SMTP_PASS
    scope: RUN_TIME
    type: SECRET
    value: 100mic10*
  - key: EMAIL_FROM
    scope: RUN_TIME
    value: "CAD Gurukul <contact@cadgurukul.com>"
  - key: EMAIL_REPLY_TO
    scope: RUN_TIME
    value: contact@cadgurukul.com
  - key: EMAIL_VERIFY_ON_STARTUP
    scope: RUN_TIME
    value: "false"
  - key: PUPPETEER_EXECUTABLE_PATH
    scope: RUN_TIME
    value: /usr/bin/chromium-browser
  - key: CHROME_HEADLESS
    scope: RUN_TIME
    value: "true"
  - key: RATE_LIMIT_WINDOW_MS
    scope: RUN_TIME
    value: "900000"
  - key: RATE_LIMIT_MAX
    scope: RUN_TIME
    value: "100"
  - key: AI_RATE_LIMIT_MAX
    scope: RUN_TIME
    value: "20"
  - key: LOG_LEVEL
    scope: RUN_TIME
    value: info
  - key: PRISMA_CONNECTION_LIMIT
    scope: RUN_TIME
    value: "3"
  - key: PRISMA_POOL_TIMEOUT
    scope: RUN_TIME
    value: "10"
  - key: PRISMA_CONNECT_TIMEOUT
    scope: RUN_TIME
    value: "10"
  - key: PRISMA_SOCKET_TIMEOUT
    scope: RUN_TIME
    value: "25"
  - key: DB_WRITE_PROBE_TIMEOUT_MS
    scope: RUN_TIME
    value: "20000"
  # WhatsApp — omit WHATSAPP_PROVIDER (or set to "stub") to disable sending
  - key: WHATSAPP_PROVIDER
    scope: RUN_TIME
    value: stub
  - key: WHATSAPP_API_URL
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_https://live-mt-server.wati.io
  - key: WHATSAPP_API_TOKEN
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your_wati_or_interakt_bearer_token

- name: frontend
  github:
    repo: adishakash/cad-gurukul
    branch: main
    deploy_on_push: true
  source_dir: frontend
  dockerfile_path: Dockerfile
  http_port: 8080
  instance_size_slug: basic-xs
  instance_count: 1
  health_check:
    http_path: /healthz
    initial_delay_seconds: 15
    period_seconds: 30
    timeout_seconds: 5
    failure_threshold: 3
  envs:
  - key: PORT
    scope: RUN_TIME
    value: "8080"
  - key: NGINX_USE_PROXY
    scope: RUN_TIME
    value: "false"
  # Runtime injection avoids stale baked-in API hosts across preview and custom domains.
  - key: API_BASE_URL
    scope: RUN_TIME
    value: "${api.PUBLIC_URL}/api/v1"
  - key: VITE_RAZORPAY_KEY_ID
    scope: BUILD_TIME
    value: rzp_live_ScUZQAwAFkKCqD
  - key: VITE_APP_NAME
    scope: BUILD_TIME
    value: CAD Gurukul

databases:
- name: db
  engine: PG
  version: "15"
  size: db-s-1vcpu-1gb
  num_nodes: 1

domains:
- domain: cadgurukul.com
  type: PRIMARY
  zone: cadgurukul.com
- domain: www.cadgurukul.com
  type: ALIAS
  zone: cadgurukul.com