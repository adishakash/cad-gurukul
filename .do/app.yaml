name: cad-gurukul
region: blr

services:
- name: api
  github:
    repo: adishakash/cad-gurukul
    branch: main
    deploy_on_push: true
  source_dir: /backend
  dockerfile_path: backend/Dockerfile
  http_port: 5000
  instance_size_slug: basic-xs
  instance_count: 1
  health_check:
    http_path: /api/v1/health
    initial_delay_seconds: 60
    period_seconds: 30
    timeout_seconds: 10
    failure_threshold: 3
  envs:
  - key: NODE_ENV
    scope: RUN_TIME
    value: production
  - key: PORT
    scope: RUN_TIME
    value: "5000"
  - key: DATABASE_URL
    scope: RUN_TIME
    value: "${db.DATABASE_URL}"
  - key: FRONTEND_URL
    scope: RUN_TIME
    value: "${frontend.PUBLIC_URL}"
  - key: JWT_SECRET
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_min64chars_random_hex_string_replace_before_deploy
  - key: JWT_REFRESH_SECRET
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_another_min64chars_random_hex_string_replace_before_deploy
  - key: JWT_ACCESS_EXPIRES_IN
    scope: RUN_TIME
    value: 15m
  - key: JWT_REFRESH_EXPIRES_IN
    scope: RUN_TIME
    value: 7d
  - key: OPENAI_API_KEY
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_sk-your-openai-api-key
  - key: OPENAI_MODEL
    scope: RUN_TIME
    value: gpt-4o
  - key: OPENAI_MAX_TOKENS
    scope: RUN_TIME
    value: "4096"
  - key: GEMINI_API_KEY
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your-gemini-api-key
  - key: GEMINI_MODEL
    scope: RUN_TIME
    value: gemini-1.5-pro
  - key: AI_DEFAULT_PROVIDER
    scope: RUN_TIME
    value: auto
  - key: RAZORPAY_KEY_ID
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_rzp_live_xxxxxxxxxxxx
  - key: RAZORPAY_KEY_SECRET
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your_razorpay_secret
  - key: RAZORPAY_WEBHOOK_SECRET
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your_webhook_secret
  - key: SMTP_HOST
    scope: RUN_TIME
    value: smtp.gmail.com
  - key: SMTP_PORT
    scope: RUN_TIME
    value: "587"
  - key: SMTP_SECURE
    scope: RUN_TIME
    value: "false"
  - key: SMTP_USER
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your_smtp_user
  - key: SMTP_PASS
    scope: RUN_TIME
    type: SECRET
    value: CHANGE_ME_your_smtp_password
  - key: EMAIL_FROM
    scope: RUN_TIME
    value: "CAD Gurukul <noreply@cadgurukul.com>"
  - key: PUPPETEER_EXECUTABLE_PATH
    scope: RUN_TIME
    value: /usr/bin/chromium-browser
  - key: CHROME_HEADLESS
    scope: RUN_TIME
    value: "true"
  - key: RATE_LIMIT_WINDOW_MS
    scope: RUN_TIME
    value: "900000"
  - key: RATE_LIMIT_MAX
    scope: RUN_TIME
    value: "100"
  - key: AI_RATE_LIMIT_MAX
    scope: RUN_TIME
    value: "20"
  - key: LOG_LEVEL
    scope: RUN_TIME
    value: info

static_sites:
- name: frontend
  github:
    repo: adishakash/cad-gurukul
    branch: main
    deploy_on_push: true
  source_dir: /frontend
  build_command: npm run build
  output_dir: dist
  index_document: index.html
  catchall_document: index.html
  envs:
  - key: VITE_API_BASE_URL
    scope: BUILD_TIME
    value: "${api.PUBLIC_URL}/api/v1"
  - key: VITE_RAZORPAY_KEY_ID
    scope: BUILD_TIME
    type: SECRET
    value: CHANGE_ME_rzp_live_xxxxxxxxxxxx

databases:
- name: db
  engine: PG
  version: "15"
  size: db-s-1vcpu-1gb
  num_nodes: 1
