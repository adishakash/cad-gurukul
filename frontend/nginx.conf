# ── HTTP – redirect to HTTPS + serve ACME challenge ──────────────────────────
server {
    listen 80;
    server_name cadgurukul.com www.cadgurukul.com;

    # Let's Encrypt certificate renewal challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS (non-www → www)
    location / {
        return 301 https://www.cadgurukul.com$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name cadgurukul.com www.cadgurukul.com;

    ssl_certificate     /etc/letsencrypt/live/cadgurukul.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cadgurukul.com/privkey.pem;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # API – proxy to backend container
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # React SPA – fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for content-hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN                              always;
    add_header X-Content-Type-Options    nosniff                                 always;
    add_header Referrer-Policy           strict-origin-when-cross-origin         always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"   always;
}
